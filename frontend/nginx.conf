server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: любой путь, не найденный в статике, отдаёт index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш для ассетов (хэши в именах — можно кэшировать надолго)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
